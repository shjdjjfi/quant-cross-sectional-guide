abstract: >+
  本文面向已经具备 Python、机器学习或大模型研究经验，但尚未系统学习金融量化研究的读者。
  目标是在进入 Qlib、金融文本因子和大模型弱标注之前，先建立一个无机器学习、无大模型、
  无未来信息泄露的股票横截面选股与回测闭环。正文依次讲解股票面板数据、收益率、传统因子、
  横截面标准化、前瞻标签、RankIC、组合构建、换手与交易成本、绩效评价、时间切分和常见偏差，
  并给出可直接运行的 Python 示例。
